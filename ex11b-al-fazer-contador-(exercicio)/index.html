<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="script.js"></script>
  <title>Exercício 11b: Gerador de Citações</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #bcbcbc;
    }

    #quote {
      font-size: 1.5rem;
      margin-bottom: 20px;
      text-align: center;
      max-width: 600px;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #6b0303;
      color: white;
    }

    button:hover {
      background-color: #000000;
    }
  </style>
</head>
<body>
  <!-- Parágrafo para exibir a citação -->
  <p id="quote">Clique no botão para gerar uma citação.</p>

  <!-- Botão para gerar uma nova citação -->
  <button id="newQuoteButton">Nova Citação</button>

  <!-- Script JavaScript embutido na página -->
  <script>

    // Array de citações
    const quotes = [
      "A vida é 10% o que acontece comigo e 90% como eu reajo a isso. - Charles R. Swindoll",
      "O sucesso é a soma de pequenos esforços repetidos dia após dia. - Robert Collier",
      "A única maneira de fazer um excelente trabalho é amar o que você faz. - Steve Jobs",
      "Não espere por oportunidades, crie-as. - George Bernard Shaw",
      "Acredite em si mesmo e todo o resto virá naturalmente. - Elissa Goodman",
      "Faça o que puder, com o que tiver, onde estiver. - Theodore Roosevelt",
      "O futuro pertence àqueles que acreditam na beleza de seus sonhos. - Eleanor Roosevelt",
      "A vida é o que acontece enquanto você está ocupado fazendo outros planos. - John Lennon",
      "Seja a mudança que você deseja ver no mundo. - Mahatma Gandhi",
      "A mente que se abre a uma nova ideia jamais voltará ao seu tamanho original. - Albert Einstein",
      "A coragem não é a ausência de medo, mas o domínio sobre ele. - Nelson Mandela",
      "Tudo o que um sonho precisa para ser realizado é alguém que acredite que ele possa ser realizado. - Roberto Shinyashiki",
      "Não conte os dias, faça os dias contarem. - Muhammad Ali",
    ];

    // Função para gerar uma nova citação
    function generateQuote() {
      const randomIndex = Math.floor(Math.random() * quotes.length);
      document.getElementById('quote').textContent = quotes[randomIndex];
    }

    // Adiciona um evento de clique ao botão para gerar uma nova citação
    document.getElementById('newQuoteButton').addEventListener('click', generateQuote); 


</script>
</body>
</html>
