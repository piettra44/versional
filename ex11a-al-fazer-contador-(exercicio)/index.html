<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11a: Temporizador</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #timer {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Temporizador -->
  <div id="timer">0</div>

  <!-- Botões de controle -->
  <button id="startButton">Iniciar</button>
  <button id="pauseButton">Pausar</button>
  <button id="resetButton">Resetar</button>

  <!-- Script JavaScript embutido na página -->
  <script>
    // Contastantes para selecionar os elementos do DOM
    const timerDisplay = document.querySelector('#timer'); // Exibe o tempo
    const startButton = document.querySelector('#startButton'); // Botão para iniciar o temporizador
    const pauseButton = document.querySelector('#pauseButton'); // Botão para pausar o temporizador
    const resetButton = document.querySelector('#resetButton'); // Botão para resetar o temporizador

    // Variáveis para armazenar o tempo e o intervalo
    let time = 0; // Tempo em segundos
    let interval; // Variável para armazenar o intervalo do temporizador

    // Função para atualizar o temporizador
    function updateTimer() {
      time++; // Aumenta o tempo a cada segundo
      timerDisplay.textContent = time; // Atualiza o temporizador
    }

    // Evento de clique para iniciar  temporizador
    startButton.addEventListener('click', () => {
      if (!interval) { // Vai verificar se o intervalo já está rodando
        interval = setInterval(updateTimer, 1000); // Inicia o temporizador a cada 1 segundo
      }
    });

    // Evento de clique para pausar o temporizador
    pauseButton.addEventListener('click', () => {
      clearInterval(interval); // Para o temporizador
      interval = null; // Reseta a variável do intervalo para permitir reiniciar
    });

    // Evento de click para resetar o temporizador
    resetButton.addEventListener('click', () => {
      clearInterval(interval); // Para o temporizador
      interval = null; // Reseta a variável do intervalo
      time = 0; // Reseta o tempo para zero
      timerDisplay.textContent = time; // Atualiza o temporizador para mostrar zero
    });


  </script>
</body>
</html>
